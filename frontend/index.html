<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cloud Ascent — Google ACE Trainer</title>
<meta name="description" content="Gamified study platform for the Google Associate Cloud Engineer certification: concept learning, nine game modes, adaptive practice, and a realistic exam simulator.">
<meta name="theme-color" content="#1a73e8">
<script src="js/config.js"></script>
<style>
  :root{
    --bg:#f6f8fc; --surface:#ffffff; --surface2:#eef2f9; --line:#dbe2ee;
    --ink:#141b2d; --ink2:#4a5670; --ink3:#75809a;
    --blue:#1a73e8; --green:#188038; --yellow:#ea9b00; --red:#d93025;
    --accentbg:#e8f0fe; --greenbg:#e6f4ea; --redbg:#fce8e6; --yellowbg:#fef7e0;
    --shadow:0 1px 3px rgba(20,27,45,.08),0 4px 16px rgba(20,27,45,.06);
    --radius:16px; --maxw:1080px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0f1420; --surface:#161d2e; --surface2:#1e2740; --line:#2b3550;
      --ink:#eaf0fb; --ink2:#aab6d0; --ink3:#7683a0;
      --blue:#8ab4f8; --green:#81c995; --yellow:#fdd663; --red:#f28b82;
      --accentbg:#1c2c4a; --greenbg:#193626; --redbg:#3a2020; --yellowbg:#352a10;
      --shadow:0 2px 6px rgba(0,0,0,.35),0 8px 28px rgba(0,0,0,.4);
    }
  }
  :root[data-theme="dark"]{
    --bg:#0f1420; --surface:#161d2e; --surface2:#1e2740; --line:#2b3550;
    --ink:#eaf0fb; --ink2:#aab6d0; --ink3:#7683a0;
    --blue:#8ab4f8; --green:#81c995; --yellow:#fdd663; --red:#f28b82;
    --accentbg:#1c2c4a; --greenbg:#193626; --redbg:#3a2020; --yellowbg:#352a10;
    --shadow:0 2px 6px rgba(0,0,0,.35),0 8px 28px rgba(0,0,0,.4);
  }
  :root[data-theme="light"]{
    --bg:#f6f8fc; --surface:#ffffff; --surface2:#eef2f9; --line:#dbe2ee;
    --ink:#141b2d; --ink2:#4a5670; --ink3:#75809a;
    --blue:#1a73e8; --green:#188038; --yellow:#ea9b00; --red:#d93025;
    --accentbg:#e8f0fe; --greenbg:#e6f4ea; --redbg:#fce8e6; --yellowbg:#fef7e0;
    --shadow:0 1px 3px rgba(20,27,45,.08),0 4px 16px rgba(20,27,45,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.55}
  h1,h2,h3,h4{margin:0;line-height:1.2;text-wrap:balance}
  button{font-family:inherit;cursor:pointer}
  ::selection{background:var(--accentbg)}
  .tnum{font-variant-numeric:tabular-nums}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  #hud{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;
    padding:10px 18px;background:color-mix(in srgb,var(--surface) 88%,transparent);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.3px}
  .logo{width:26px;height:26px;border-radius:7px;background:
    conic-gradient(from 45deg,var(--blue) 0 25%,var(--red) 0 50%,var(--yellow) 0 75%,var(--green) 0);
    box-shadow:var(--shadow)}
  .brand small{display:block;font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.5px}
  .hud-stat{display:flex;flex-direction:column;padding:4px 12px;border-radius:12px;background:var(--surface2);min-width:70px}
  .hud-stat b{font-size:15px;font-variant-numeric:tabular-nums}
  .hud-stat span{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3)}
  #xpwrap{flex:1;min-width:160px;display:flex;flex-direction:column;gap:4px}
  #xpwrap .lvlrow{display:flex;justify-content:space-between;font-size:11px;color:var(--ink2)}
  .bar{height:8px;border-radius:99px;background:var(--surface2);overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--green));transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .icobtn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:10px;padding:7px 11px;font-size:13px;font-weight:600}
  .icobtn:hover{background:var(--surface2)}

  #app{display:grid;grid-template-columns:230px 1fr;gap:0;min-height:calc(100vh - 57px)}
  #side{border-right:1px solid var(--line);padding:16px 12px;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto}
  .navsec{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin:14px 8px 6px;font-weight:700}
  .navitem{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:0;background:transparent;color:var(--ink2);
    padding:9px 10px;border-radius:10px;font-size:13.5px;font-weight:600;margin-bottom:2px}
  .navitem:hover{background:var(--surface2);color:var(--ink)}
  .navitem.on{background:var(--accentbg);color:var(--blue)}
  .navitem .ni{width:20px;text-align:center;font-size:15px}
  .navitem .badge{margin-left:auto;font-size:10px;background:var(--surface2);padding:1px 7px;border-radius:99px;color:var(--ink3);font-variant-numeric:tabular-nums}
  #main{padding:26px clamp(16px,4vw,40px);max-width:var(--maxw);margin:0 auto;width:100%}
  .view{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(.9)}60%{transform:scale(1.05)}100%{transform:scale(1)}}

  .eyebrow{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);font-weight:700}
  .h-title{font-size:clamp(24px,4vw,34px);font-weight:800;letter-spacing:-.5px;margin:6px 0 4px}
  .sub{color:var(--ink2);font-size:15px;max-width:62ch}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:820px){.g2,.g3,.g4{grid-template-columns:1fr} #app{grid-template-columns:1fr} #side{display:none}}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px}
  .p-blue{background:var(--accentbg);color:var(--blue)} .p-green{background:var(--greenbg);color:var(--green)}
  .p-red{background:var(--redbg);color:var(--red)} .p-yellow{background:var(--yellowbg);color:var(--yellow)}
  .hy{background:linear-gradient(90deg,#ea9b00,#d93025);color:#fff!important}
  .stars{color:var(--yellow);letter-spacing:1px;font-size:12px}
  .btn{border:0;border-radius:12px;padding:12px 18px;font-size:14px;font-weight:700;background:var(--blue);color:#fff;box-shadow:var(--shadow)}
  .btn:hover{filter:brightness(1.06)} .btn:active{transform:translateY(1px)}
  .btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);box-shadow:none}
  .btn.sm{padding:8px 13px;font-size:12.5px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  table{border-collapse:collapse;width:100%;font-size:13.5px}
  .tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:var(--surface2);font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink2);position:sticky;top:0}
  tr:last-child td{border-bottom:0}

  .mode{padding:18px;border-radius:var(--radius);border:1px solid var(--line);background:var(--surface);cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
  .mode:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
  .mode .mi{font-size:26px} .mode h4{margin:10px 0 4px;font-size:16px} .mode p{margin:0;font-size:12.5px;color:var(--ink2)}
  .mode::after{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:var(--accent,var(--blue))}

  .modcard{padding:18px;cursor:pointer;transition:transform .15s}
  .modcard:hover{transform:translateY(-2px)}
  .modcard .ring{--p:0;width:46px;height:46px;border-radius:50%;
    background:conic-gradient(var(--green) calc(var(--p)*1%),var(--surface2) 0);
    display:grid;place-items:center;font-size:11px;font-weight:800}
  .modcard .ring i{width:34px;height:34px;border-radius:50%;background:var(--surface);display:grid;place-items:center;font-style:normal}

  .qwrap{max-width:760px;margin:0 auto}
  .opt{display:block;width:100%;text-align:left;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);
    padding:14px 16px;border-radius:12px;margin-bottom:10px;font-size:14px;font-weight:500;transition:.15s;position:relative}
  .opt:hover:not(:disabled){border-color:var(--blue);background:var(--accentbg)}
  .opt .k{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:7px;background:var(--surface2);font-weight:800;font-size:12px;margin-right:10px}
  .opt.correct{border-color:var(--green);background:var(--greenbg)} .opt.correct .k{background:var(--green);color:#fff}
  .opt.wrong{border-color:var(--red);background:var(--redbg)} .opt.wrong .k{background:var(--red);color:#fff}
  .opt:disabled{cursor:default}
  .explain{border-left:4px solid var(--blue);background:var(--surface2);padding:14px 16px;border-radius:0 12px 12px 0;margin-top:6px;font-size:13.5px;animation:fade .3s}
  .explain h5{margin:0 0 6px;font-size:13px} .explain .whywrong{margin-top:10px;font-size:12.5px;color:var(--ink2)}
  .explain .whywrong div{margin:4px 0;padding-left:18px;position:relative}
  .explain .whywrong div::before{content:"✕";position:absolute;left:0;color:var(--red);font-weight:800}
  .trickbox{margin-top:10px;background:var(--yellowbg);border-radius:10px;padding:10px 12px;font-size:12.5px}
  .qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:12px;color:var(--ink3);gap:10px;flex-wrap:wrap}
  .streakchip{font-weight:800;color:var(--yellow)}
  .timerbar{height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:16px}
  .timerbar>i{display:block;height:100%;background:var(--yellow);width:100%;transition:width 1s linear}

  .flip{perspective:1400px;max-width:560px;margin:20px auto}
  .flip .inner{position:relative;transform-style:preserve-3d;transition:transform .55s;min-height:300px}
  .flip.flipped .inner{transform:rotateY(180deg)}
  .flip .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);border:1px solid var(--line);
    background:var(--surface);box-shadow:var(--shadow);padding:26px;display:flex;flex-direction:column;justify-content:center}
  .flip .back{transform:rotateY(180deg);overflow-y:auto}

  .matchgrid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  @media(max-width:640px){.matchgrid{grid-template-columns:1fr}}
  .drag{padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface);margin-bottom:10px;font-size:13px;font-weight:600;cursor:grab}
  .drag.dragging{opacity:.4} .drag[draggable=false]{opacity:.55;cursor:default;border-style:dashed}
  .drop{min-height:52px;padding:10px 14px;border:1.5px dashed var(--line);border-radius:11px;background:var(--surface2);margin-bottom:10px;font-size:13px;transition:.15s}
  .drop.over{border-color:var(--blue);background:var(--accentbg)}
  .drop.filled{border-style:solid} .drop.ok{border-color:var(--green);background:var(--greenbg)} .drop.no{border-color:var(--red);background:var(--redbg)}
  .drop .lbl{font-weight:700;font-size:11px;color:var(--ink3);display:block;margin-bottom:3px}

  .memgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:640px;margin:0 auto}
  @media(max-width:560px){.memgrid{grid-template-columns:repeat(3,1fr)}}
  .mcard{aspect-ratio:1;border-radius:12px;border:1px solid var(--line);background:var(--blue);color:#fff;
    display:grid;place-items:center;font-size:12px;font-weight:700;text-align:center;padding:8px;cursor:pointer;
    transition:transform .3s;transform-style:preserve-3d;position:relative}
  .mcard.up{background:var(--surface);color:var(--ink);border-color:var(--blue)}
  .mcard.done{background:var(--greenbg);color:var(--green);border-color:var(--green);cursor:default}
  .mcard.face-down span{display:none}

  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);z-index:90;
    background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:12px;font-weight:700;font-size:13.5px;
    box-shadow:var(--shadow);transition:transform .4s cubic-bezier(.2,.8,.2,1);max-width:90vw}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #ach{position:fixed;top:70px;right:18px;z-index:90;display:flex;flex-direction:column;gap:8px}
  .achpop{background:var(--surface);border:1px solid var(--yellow);border-left:5px solid var(--yellow);border-radius:12px;
    padding:12px 16px;box-shadow:var(--shadow);animation:slidein .4s;max-width:280px}
  @keyframes slidein{from{transform:translateX(120%)}to{transform:none}}
  .achpop b{display:block;font-size:13px} .achpop small{color:var(--ink2);font-size:11.5px}

  .kpi{padding:16px} .kpi .n{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-1px}
  .kpi .l{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);font-weight:700}
  .barrow{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:12.5px}
  .barrow .nm{width:130px;flex-shrink:0;color:var(--ink2);font-weight:600}
  .barrow .track{flex:1;height:9px;background:var(--surface2);border-radius:99px;overflow:hidden}
  .barrow .track>i{display:block;height:100%;border-radius:99px;transition:width .6s}
  .barrow .pct{width:42px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
  .empty{text-align:center;color:var(--ink3);padding:40px 20px;font-size:14px}
  .chip{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--surface2);color:var(--ink2);margin:2px}
  .seg{display:inline-flex;background:var(--surface2);border-radius:10px;padding:3px;gap:2px;flex-wrap:wrap}
  .seg button{border:0;background:transparent;color:var(--ink2);padding:6px 12px;border-radius:8px;font-size:12.5px;font-weight:700}
  .seg button.on{background:var(--surface);color:var(--blue);box-shadow:var(--shadow)}
  .accordion{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px}
  .accordion>summary{padding:13px 16px;font-weight:700;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .accordion>summary::-webkit-details-marker{display:none}
  .accordion[open]>summary{border-bottom:1px solid var(--line);background:var(--surface2)}
  .accordion .body{padding:14px 16px;font-size:13.5px}
  .mn{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;background:var(--surface2);padding:1px 6px;border-radius:5px}
</style>
</head>
<body>

<div id="hud">
  <div class="brand"><div class="logo"></div><div>Cloud Ascent<small>GCP ACE TRAINER</small></div></div>
  <div class="hud-stat"><b id="hudStreak" class="tnum">0</b><span>🔥 Streak</span></div>
  <div class="hud-stat"><b id="hudAcc" class="tnum">—</b><span>Accuracy</span></div>
  <div id="xpwrap">
    <div class="lvlrow"><span id="hudLvl">Level 1 · Trainee</span><span id="hudXp" class="tnum">0 / 100 XP</span></div>
    <div class="bar"><i id="xpbar" style="width:0%"></i></div>
  </div>
  <button class="icobtn" id="themeBtn" title="Toggle theme">◐</button>
  <button class="icobtn" id="resetBtn" title="Reset progress">↺</button>
</div>

<div id="app">
  <nav id="side"></nav>
  <main id="main"></main>
</div>

<div id="toast"></div>
<div id="ach"></div>
<script src="js/app.js" defer></script>
<script src="js/sync.js" defer></script>
</body>
</html>
