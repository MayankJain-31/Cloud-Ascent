name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install backend dependencies
        working-directory: backend
        run: npm install
      - name: Syntax check all source files
        working-directory: backend
        run: |
          for f in $(find src -name '*.js'); do node --check "$f"; done
      - name: Boot smoke test
        working-directory: backend
        env:
          NODE_ENV: development
        run: |
          node src/server.js & PID=$!
          sleep 2
          curl -sf http://localhost:8080/api/health && echo "health OK"
          kill $PID
