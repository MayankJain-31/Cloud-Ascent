# Local one-command run: API + frontend on http://localhost:8080
# 1) create backend/.env from backend/.env.example and set a strong JWT_SECRET
# 2) docker compose up --build
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      SERVE_FRONTEND: "1"
      PORT: "8080"
      # Provide a strong secret via your shell env or an .env file next to this compose file.
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in your environment}
      CORS_ORIGINS: http://localhost:8080
      DB_PATH: /app/backend/data/cloud-ascent.db
    volumes:
      - ca-data:/app/backend/data
    restart: unless-stopped

volumes:
  ca-data:
